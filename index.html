<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Modern Calculator</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="calculator">


    <div class="display">

        <div id="previousOperand"></div>

        <div id="currentOperand">
            0
        </div>

    </div>



    <div class="buttons">


        <button class="span-two action" data-action="clear">
            AC
        </button>


        <button class="action" data-action="delete">
            ⌫
        </button>


        <button class="operator" data-operation="/">
            ÷
        </button>



        <button data-number>
            7
        </button>

        <button data-number>
            8
        </button>

        <button data-number>
            9
        </button>

        <button class="operator" data-operation="*">
            ×
        </button>



        <button data-number>
            4
        </button>

        <button data-number>
            5
        </button>

        <button data-number>
            6
        </button>

        <button class="operator" data-operation="-">
            -
        </button>



        <button data-number>
            1
        </button>

        <button data-number>
            2
        </button>

        <button data-number>
            3
        </button>

        <button class="operator" data-operation="+">
            +
        </button>



        <button data-number>
            0
        </button>

        <button data-number>
            .
        </button>

        <button class="action" data-action="percentage">
            %
        </button>

        <button class="equals" data-action="calculate">
            =
        </button>


    </div>


</div>



<script src="script.js"></script>


</body>

</html>
